<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
    <defs>
        <radialGradient id="grad1" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#eae3f0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4b2354;stop-opacity:1" />
        </radialGradient>
    </defs>
    <rect width="800" height="800" fill="url(#grad1)" />
    <!-- White abstract shape -->
    <path d="M 100 350 C 100 150, 400 200, 600 250 C 750 300, 800 550, 500 700 C 200 850, 100 650, 100 350 Z" fill="#ffffff" />
    
    <!-- Abstract representation of people and elements from the image -->
    <g transform="translate(100, 50)">
        <!-- Whiteboard -->
        <rect x="450" y="320" width="120" height="150" fill="#ffffff" stroke="#4b2354" stroke-width="4"/>
        <line x1="470" y1="470" x2="450" y2="600" stroke="#4b2354" stroke-width="4" />
        <line x1="550" y1="470" x2="570" y2="600" stroke="#4b2354" stroke-width="4" />
        <!-- Table -->
        <rect x="150" y="380" width="180" height="8" fill="#4b2354" />
        <line x1="170" y1="388" x2="160" y2="480" stroke="#4b2354" stroke-width="4" />
        <line x1="310" y1="388" x2="320" y2="480" stroke="#4b2354" stroke-width="4" />
        <!-- Books on table -->
        <rect x="220" y="340" width="60" height="40" fill="#ffffff" stroke="#4b2354" stroke-width="3" />
        <line x1="250" y1="340" x2="250" y2="380" stroke="#4b2354" stroke-width="2" />
        
        <!-- People -->
        <!-- Person 1 (left) -->
        <circle cx="150" cy="280" r="25" fill="#1a1a1a" />
        <path d="M 120 330 Q 150 310 180 330 L 180 400 L 120 400 Z" fill="#813c91" />
        <!-- Person 2 (middle left) -->
        <circle cx="240" cy="260" r="25" fill="#1a1a1a" />
        <path d="M 210 310 Q 240 290 270 310 L 270 340 L 210 340 Z" fill="#813c91" />
        <!-- Person 3 (right) -->
        <circle cx="330" cy="270" r="25" fill="#1a1a1a" />
        <path d="M 300 320 Q 330 300 360 320 L 360 380 L 300 380 Z" fill="#813c91" />
        
        <!-- Person standing (presenting) -->
        <circle cx="410" cy="380" r="25" fill="#1a1a1a" />
        <path d="M 380 430 Q 410 410 440 430 L 440 540 L 380 540 Z" fill="#813c91" />
        <rect x="390" y="540" width="15" height="80" fill="#1a1a1a" />
        <rect x="415" y="540" width="15" height="80" fill="#1a1a1a" />

        <!-- Person sitting on floor (bottom left) -->
        <circle cx="200" cy="580" r="25" fill="#1a1a1a" />
        <path d="M 170 630 Q 200 610 230 630 L 230 680 L 170 680 Z" fill="#813c91" />
        <!-- Laptop -->
        <rect x="180" y="650" width="60" height="30" rx="3" fill="#333333" />
        <!-- Books on floor -->
        <rect x="300" y="660" width="70" height="15" fill="#ffffff" stroke="#4b2354" stroke-width="2" />
        <rect x="305" y="645" width="60" height="15" fill="#ffffff" stroke="#4b2354" stroke-width="2" />
        <rect x="310" y="630" width="50" height="15" fill="#ffffff" stroke="#4b2354" stroke-width="2" />
    </g>
</svg>
