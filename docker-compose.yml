version: '3.8'

# The PostgreSQL database is expected to run LOCALLY (not in Docker).
# Run `scripts/setup-local-db.sh` (or setup-local-db.ps1 on Windows) once to create
# the user and database, then start this compose stack.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # On Mac/Linux use host.docker.internal; on Linux you may need your LAN IP instead
      DATABASE_URL: postgresql://lms_user:lms_password@host.docker.internal:5432/lms_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      CORS_ORIGINS: http://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/certificates:/app/certificates
      - ./backend/uploads:/app/uploads
      - "./excel sheets:/app/excel_sheets"

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
